<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobblemon Pokédex</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1><span>Cobblemon</span> Pokédex</h1>
  </header>

  <div class="container" style="margin-top: 2rem; padding-bottom: 4rem;">

    <!-- Top 5 Strongest -->
    <div class="top5-section">
      <h2 class="top5-title">⚔️ Strongest Pokémon</h2>
      <p class="top5-subtitle">Ranked by total base stats</p>
      <div id="top5Grid" class="top5-grid" style="display:flex;flex-direction:row;flex-wrap:nowrap;gap:1rem;"></div>
    </div>

    <!-- Filters -->
    <div class="filters-row">
      <input id="searchInput" type="text" placeholder="Search by name or #…" autocomplete="off">
      <select id="typeFilter">
        <option value="">All Types</option>
        <!-- Populated dynamically from data -->
      </select>
      <select id="genFilter">
        <option value="">All Gens</option>
        <!-- Populated dynamically from data -->
      </select>
    </div>

    <!-- Grid -->
    <div id="pokemonGrid"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
