<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobblemon Pokédex</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1><span>Cobblemon</span> Pokédex</h1>
  </header>
  <nav class="site-nav">
    <div class="container">
      <div class="nav-links">
        <a href="index.html" class="nav-link active">📖 Pokédex</a>
        <a href="compare.html" class="nav-link">⚔️ Compare & Calc</a>
        <a href="games.html" class="nav-link">🎮 Games</a>
        <a href="pokedex.html" class="nav-link">🗂️ My Pokédex</a>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top: 2rem; padding-bottom: 4rem;">

    <!-- Pokédex Completion Counter -->
    <div id="completionBar" class="completion-bar"></div>

    <!-- Top 5 Strongest -->
    <div class="top5-section">
      <h2 class="top5-title">⚔️ Strongest Pokémon</h2>
      <p class="top5-subtitle">Ranked by total base stats</p>
      <div id="top5Grid" class="top5-grid" style="display:flex;flex-wrap:nowrap;gap:1rem;"></div>
    </div>

    <!-- Filters -->
    <div class="filters-row">
      <input id="searchInput" type="text" placeholder="Search by name or #…" autocomplete="off">
      <select id="typeFilter">
        <option value="">All Types</option>
      </select>
      <select id="genFilter">
        <option value="">All Gens</option>
      </select>
    </div>

    <!-- Grid -->
    <div id="pokemonGrid"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
    </div>

    <!-- Pagination -->
    <div id="pagination"></div>

    <!-- Pokémon of the Day -->
    <div class="potd-section" style="margin-top:2.5rem;">
      <h2 class="top5-title">🌟 Pokémon of the Day</h2>
      <p class="top5-subtitle">Resets at midnight</p>
      <div id="potdCard"></div>
    </div>

    <!-- Recently Viewed -->
    <div id="recentSection" class="recent-section" style="display:none;margin-top:2rem;">
      <h2 class="top5-title">🕐 Recently Viewed</h2>
      <div id="recentGrid" style="display:flex;flex-wrap:nowrap;gap:1rem;overflow-x:auto;padding-bottom:0.5rem;"></div>
    </div>

  </div>

  <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

  <script src="script.js"></script>
</body>
</html>
