<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('cobblemon_settings') || '{}');
        var t = s.theme || 'dark';
        if (t !== 'dark') document.documentElement.classList.add('theme-' + t);
        var fonts = ['font-sm','font-md','font-lg','font-xl'];
        document.documentElement.classList.add(fonts[s.fontSize != null ? s.fontSize : 1] || 'font-md');
        if (s.compact) document.documentElement.classList.add('compact');
        if (s.animations === false) document.documentElement.classList.add('no-animations');
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Reports — Cobblemon Pokédex</title>
  <link rel="icon" type="image/png" href="assets/images/items/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1><span>Cobblemon</span> Pokédex</h1>
  </header>
  <nav class="site-nav">
    <div class="container">
      <div class="nav-links">
        <a href="index.html" class="nav-link">📖 Pokédex</a>
        <a href="compare.html" class="nav-link">⚔️ Compare & Calc</a>
        <a href="randomizer.html" class="nav-link">🎲 Randomizer</a>
        <a href="games.html" class="nav-link">🎮 Games</a>
        <a href="pokedex.html" class="nav-link">🗂️ My Pokédex</a>
        <a href="reports.html" class="nav-link active">📢 Reports</a>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top:2rem;padding-bottom:4rem;">
    <div id="rpApp"></div>
  </div>

  <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

  <!-- Auth Modal -->
  <div id="rpAuthOverlay" class="rp-overlay" style="display:none;">
    <div class="rp-modal">
      <div id="rpAuthContent"></div>
    </div>
  </div>

  <!-- Generic Modal (create/edit/admin actions) -->
  <div id="rpModalOverlay" class="rp-overlay" style="display:none;" onclick="rpCloseModal(event)">
    <div class="rp-modal" onclick="event.stopPropagation()">
      <div id="rpModalContent"></div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
